<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AIKUM SSC Quiz</title>

<style>
body{font-family:sans-serif;background:#0b2a3a;color:#fff;text-align:center;}
.box{background:#123e5a;padding:20px;margin:15px;border-radius:10px;}
button{padding:12px;margin:5px;width:90%;background:orange;border:none;color:#fff;font-size:16px;border-radius:5px;}
input{padding:12px;margin:5px;width:90%;border-radius:5px;border:none;}
</style>
</head>

<body>

<div id="start" class="box">
<h2>🇮🇳 AIKUM SSC Quiz 🎯</h2>

<input id="playerName" type="text" placeholder="आपका नाम">
<input id="village" type="text" placeholder="गांव का नाम">
<input id="phone" type="tel" placeholder="मोबाइल नंबर">

<button type="button" onclick="startGame()">Start Game</button>
</div>

<div id="game" class="box" style="display:none;">
<h3 id="q"></h3>

<button onclick="ans(0)" id="o0"></button>
<button onclick="ans(1)" id="o1"></button>
<button onclick="ans(2)" id="o2"></button>
<button onclick="ans(3)" id="o3"></button>

<h3 id="timer"></h3>
<h3 id="score"></h3>
<h3 id="level"></h3>
</div>

<div id="result" class="box" style="display:none;"></div>

<script>

// QUESTIONS
let questions = [
{q:"भारत की राजधानी क्या है?",o:["मुंबई","दिल्ली","कोलकाता","चेन्नई"],a:1},
{q:"2+2=?",o:["3","4","5","6"],a:1},
{q:"5×6=?",o:["25","30","35","40"],a:1},
{q:"ताजमहल कहाँ है?",o:["दिल्ली","आगरा","जयपुर","लखनऊ"],a:1},
{q:"राष्ट्रीय पशु?",o:["हाथी","शेर","बाघ","घोड़ा"],a:2}
];

// VARIABLES
let i=0,score=0,timer,t=10;
let player="",village="",phone="";

// START GAME
function startGame(){

player=document.getElementById("playerName").value.trim();
village=document.getElementById("village").value.trim();
phone=document.getElementById("phone").value.trim();

if(player==="" || village==="" || phone===""){
alert("सभी जानकारी भरें");
return;
}

document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";

loadQ();
}

// LOAD QUESTION
function loadQ(){
let q=questions[i];

document.getElementById("q").innerText=q.q;

for(let x=0;x<4;x++){
document.getElementById("o"+x).innerText=q.o[x];
}

document.getElementById("score").innerText="Score: "+score;
document.getElementById("level").innerText="Question: "+(i+1);

startTimer();
}

// TIMER
function startTimer(){
t=10;
clearInterval(timer);

timer=setInterval(()=>{
t--;
document.getElementById("timer").innerText="Time: "+t;

if(t<=0){
clearInterval(timer);
next();
}
},1000);
}

// ANSWER
function ans(x){
clearInterval(timer);

if(x===questions[i].a){
score++;
}

next();
}

// NEXT
function next(){
i++;
if(i>=questions.length){
end();
return;
}
loadQ();
}

// END
function end(){
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=`
<h2>Game Over 🎉</h2>
<h3>${player}</h3>
<h3>${village}</h3>
<h3>Score: ${score}/${questions.length}</h3>

<button onclick="location.reload()">🔄 Play Again</button>
`;
}

</script>

</body>
</html>
