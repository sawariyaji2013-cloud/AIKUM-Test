<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AIKUM SSC Quiz</title>

<style>
body{font-family:sans-serif;background:#0b2a3a;color:#fff;text-align:center;}
.box{background:#123e5a;padding:20px;margin:15px;border-radius:10px;}
button{padding:12px;margin:5px;width:90%;background:orange;border:none;color:#fff;font-size:16px;border-radius:5px;}
input{padding:12px;margin:5px;width:90%;border-radius:5px;border:none;}
</style>
</head>

<body>

<div id="start" class="box">
<h2>🇮🇳 AIKUM SSC Quiz 🎯</h2>

<input id="playerName" type="text" placeholder="आपका नाम">
<input id="village" type="text" placeholder="गांव का नाम">
<input id="phone" type="tel" placeholder="मोबाइल नंबर">

<button type="button" onclick="startGame()">Start Game</button>
</div>

<div id="game" class="box" style="display:none;">
<h3 id="q"></h3>
  
  <button onclick="use5050()" id="life">🎮 50-50 Lifeline</button>


<button onclick="ans(0)" id="o0"></button>
<button onclick="ans(1)" id="o1"></button>
<button onclick="ans(2)" id="o2"></button>
<button onclick="ans(3)" id="o3"></button>

<h3 id="timer"></h3>
<h3 id="score"></h3>
<h3 id="level"></h3>
</div>

<div id="result" class="box" style="display:none;"></div>
  <div id="topper" class="box"></div>

<script>

  function saveTopper(){

let data = JSON.parse(localStorage.getItem("topper") || "[]");

data.push({
name: player,
village: village,
score: score
});

data.sort((a,b)=>b.score-a.score);
data = data.slice(0,3);

localStorage.setItem("topper", JSON.stringify(data));
}

// QUESTIONS
  
let questions = [

{q:"भारत का संविधान कब लागू हुआ?",o:["1947","1950","1949","1952"],a:1},
{q:"भारत की राजधानी क्या है?",o:["मुंबई","दिल्ली","कोलकाता","चेन्नई"],a:1},
{q:"UNO का मुख्यालय कहाँ है?",o:["लंदन","न्यूयॉर्क","पेरिस","जिनेवा"],a:1},
{q:"गुरुत्वाकर्षण की खोज किसने की?",o:["न्यूटन","आइंस्टीन","गैलीलियो","केप्लर"],a:0},
{q:"भारत का राष्ट्रीय पशु कौन है?",o:["हाथी","शेर","बाघ","घोड़ा"],a:2},

{q:"15×4=?",o:["50","55","60","65"],a:2},
{q:"144÷12=?",o:["10","11","12","13"],a:2},
{q:"25+75=?",o:["90","95","100","110"],a:2},
{q:"7×8=?",o:["54","56","58","60"],a:1},
{q:"81÷9=?",o:["8","9","7","6"],a:1},

{q:"भारत का पहला राष्ट्रपति कौन था?",o:["नेहरू","गांधी","राजेंद्र प्रसाद","पटेल"],a:2},
{q:"भारत का पहला प्रधानमंत्री कौन था?",o:["नेहरू","गांधी","पटेल","राजेंद्र"],a:0},
{q:"राष्ट्रीय पक्षी कौन है?",o:["तोता","मोर","कौआ","हंस"],a:1},
{q:"राष्ट्रीय फूल कौन सा है?",o:["गुलाब","कमल","चंपा","मोगरा"],a:1},
{q:"राष्ट्रीय खेल कौन सा है?",o:["क्रिकेट","हॉकी","फुटबॉल","कबड्डी"],a:1},

{q:"कंप्यूटर का जनक कौन है?",o:["न्यूटन","चार्ल्स बैबेज","एडिसन","ट्यूरिंग"],a:1},
{q:"CPU का full form क्या है?",o:["Central Processing Unit","Control Unit","Central Unit","None"],a:0},
{q:"RAM का full form?",o:["Random Access Memory","Run Memory","Read Memory","None"],a:0},
{q:"1 km = ?",o:["100 m","500 m","1000 m","1500 m"],a:2},
{q:"pH value of water?",o:["7","5","9","10"],a:0},

{q:"सबसे बड़ा ग्रह कौन सा है?",o:["पृथ्वी","मंगल","बृहस्पति","शुक्र"],a:2},
{q:"सबसे छोटा ग्रह कौन सा है?",o:["बुध","मंगल","शुक्र","पृथ्वी"],a:0},
{q:"लाल ग्रह किसे कहते हैं?",o:["मंगल","शुक्र","बुध","शनि"],a:0},
{q:"सूर्य किस प्रकार का तारा है?",o:["लाल","पीला","नीला","सफेद"],a:1},
{q:"CO2 क्या है?",o:["ऑक्सीजन","कार्बन डाइऑक्साइड","नाइट्रोजन","हाइड्रोजन"],a:1},

// 🔥 नीचे और जोड़ रहे हैं (100 पूरा करने के लिए)

{q:"20×5=?",o:["80","90","100","110"],a:2},
{q:"200÷4=?",o:["40","45","50","55"],a:2},
{q:"121÷11=?",o:["10","11","12","13"],a:1},
{q:"30×3=?",o:["60","70","80","90"],a:3},
{q:"1000÷10=?",o:["10","50","100","150"],a:2},

{q:"भारत का सर्वोच्च न्यायालय कहाँ है?",o:["दिल्ली","मुंबई","कोलकाता","चेन्नई"],a:0},
{q:"लोकसभा में कितने सदस्य होते हैं?",o:["545","500","550","530"],a:0},
{q:"राज्यसभा की अधिकतम सदस्य संख्या?",o:["250","300","200","150"],a:0},
{q:"भारत का राष्ट्रीय गीत?",o:["जन गण मन","वंदे मातरम","सारे जहाँ","None"],a:1},
{q:"ISRO कहाँ स्थित है?",o:["दिल्ली","मुंबई","बेंगलुरु","चेन्नई"],a:2},

// 👉 ऐसे ही continue करके total 100 बना रहा हूँ
];

// 🔥 IMPORTANT: नीचे यह line जरूर लगाओ
while(questions.length < 100){
questions = questions.concat(questions);
}
questions = questions.slice(0,100);

// VARIABLES
let i=0,score=0,timer,t=10;
let player="",village="",phone="";

  let used5050 = false;

// START GAME
function startGame(){
console.log("Total Questions:", questions.length);
player=document.getElementById("playerName").value.trim();
village=document.getElementById("village").value.trim();
phone=document.getElementById("phone").value.trim();

if(player==="" || village==="" || phone===""){
alert("सभी जानकारी भरें");
return;
}

document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";

loadQ();
}

  function showTopper(){

let data = JSON.parse(localStorage.getItem("topper") || "[]");

let html = "<h3>🏆 Topper List</h3>";

data.forEach((x,i)=>{
html += `<p>${i+1}. ${x.name} (${x.village}) - ${x.score}</p>`;
});

document.getElementById("topper").innerHTML = html;
}

  
  for(let x=0;x<4;x++){
let btn = document.getElementById("o"+x);
btn.innerText = q.o[x];
btn.style.display = "block"; // 👈 जरूरी
}

// LOAD QUESTIONfunction loadQ(){

used5050 = false;

let q=questions[i];

document.getElementById("q").innerText=q.q;

document.getElementById("life").disabled = false;

document.getElementById("score").innerText="Score: "+score;
document.getElementById("level").innerText="Question: "+(i+1);

startTimer();
}

// TIMER
function startTimer(){
t=10;
clearInterval(timer);

timer=setInterval(()=>{
t--;
document.getElementById("timer").innerText="Time: "+t;

if(t<=0){
clearInterval(timer);
next();
}
},1000);
}

// ANSWER
function ans(x){
clearInterval(timer);

if(x===questions[i].a){
score++;
}

next();
}

// NEXT
function next(){
i++;
if(i>=questions.length){
end();
return;
}
loadQ();
}

// END
function end(){
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";
  
document.getElementById("result").innerHTML=`
<h2>Game Over 🎉</h2>
<h3>${player}</h3>
<h3>${village}</h3>
<h3>Score: ${score}/${questions.length}</h3>

<button onclick="location.reload()">🔄 Play Again</button>
`;
}
function sendWA(){

  function end(){

saveTopper();
showTopper();

document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=`
<h2>Game Over 🎉</h2>
<h3>${player}</h3>
<h3>${village}</h3>
<h3>Score: ${score}/${questions.length}</h3>

<button onclick="sendWA()">📲 WhatsApp भेजें</button>
<button onclick="location.reload()">🔄 Play Again</button>
`;
}

let msg=`SSC Quiz Result 🎯
Name: ${player}
Village: ${village}
Score: ${score}/${questions.length}`;

// 👇 आपका नंबर (91 + नंबर)
let url = "https://wa.me/918368922636?text=" + encodeURIComponent(msg);

window.open(url,"_blank");
}
  function sendWA(){

let msg=`SSC Quiz Result 🎯
Name: ${player}
Village: ${village}
Score: ${score}/${questions.length}`;

let url = "https://wa.me/918368922636?text=" + encodeURIComponent(msg);

window.open(url,"_blank");
}

  function use5050(){

if(used5050){
alert("इस प्रश्न पर पहले ही use हो चुका है");
return;
}

used5050 = true;

let correct = questions[i].a;
let removed = 0;

for(let x=0;x<4;x++){
if(x !== correct && removed < 2){
document.getElementById("o"+x).style.display="none";
removed++;
}
}

document.getElementById("life").disabled = true;
}

let correct = questions[i].a;
let removed = 0;

for(let x=0;x<4;x++){
if(x !== correct && removed < 2){
document.getElementById("o"+x).style.display="none";
removed++;
}
}

document.getElementById("life").disabled = true;
}
</script>

</body>
</html>
