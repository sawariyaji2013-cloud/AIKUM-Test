{q:"UPSC कार्य?", o:["Exam","Law","Finance","Election"], a:0},
{q:"Election Commission?", o:["Conduct election","Law","Tax","Police"], a:0},

];

// LOAD DATA
let questions=JSON.parse(localStorage.getItem("questions"))||defaultQ;
let wrongQ=JSON.parse(localStorage.getItem("wrongQ"))||[];
let scores=JSON.parse(localStorage.getItem("scores"))||[];

// USER AUTO LOAD
if(localStorage.getItem("user")){
let u=JSON.parse(localStorage.getItem("user"));
document.getElementById("name").value=u.name;
document.getElementById("village").value=u.village;
}

let i=0,score=0,timer,t=10;
let used5050=false;

// START
function startGame(){

let name=document.getElementById("name").value;
let village=document.getElementById("village").value;

if(name==""||village==""){
alert("नाम और गांव डालें");
return;
}

// SAVE USER
localStorage.setItem("user",JSON.stringify({name,village}));

// REMOVE DUPLICATE
questions=removeDuplicate(questions);

// MERGE WRONG QUESTIONS FIRST
questions=[...wrongQ,...questions];

// SHUFFLE
questions=shuffle(questions);

// LIMIT
questions=questions.slice(0,100);

document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";

loadQ();
}

// REMOVE DUPLICATE
function removeDuplicate(arr){
let unique=[];
arr.forEach(q=>{
if(!unique.some(x=>x.q===q.q)){
unique.push(q);
}
});
localStorage.setItem("questions",JSON.stringify(unique));
return unique;
}

// SHUFFLE
function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

// LOAD
function loadQ(){

used5050=false;

let q=questions[i];

document.getElementById("q").innerText=q.q;

for(let x=0;x<4;x++){
let btn=document.getElementById("o"+x);
btn.style.display="block";
btn.innerText=q.o[x];
}

document.getElementById("score").innerText="Score: "+score;

startTimer();
}

// TIMER
function startTimer(){
t=10;
clearInterval(timer);

timer=setInterval(()=>{
t--;
document.getElementById("timer").innerText="Time: "+t;

if(t<=0){
clearInterval(timer);
saveWrong();
next();
}
},1000);
}

// ANSWER
function answer(x){

clearInterval(timer);

if(x===questions[i].a){
score++;
}else{
saveWrong();
}

next();
}

// SAVE WRONG
function saveWrong(){
wrongQ.push(questions[i]);
localStorage.setItem("wrongQ",JSON.stringify(wrongQ));
}

// NEXT
function next(){
i++;
if(i<questions.length){
loadQ();
}else{
endGame();
}
}

// 50-50
function use5050(){

if(used5050) return;
used5050=true;

let correct=questions[i].a;

let removed=0;

for(let x=0;x<4;x++){
if(x!==correct && removed<2){
document.getElementById("o"+x).style.display="none";
removed++;
}
}
}

// END
function endGame(){

saveScore();

document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";

let user=JSON.parse(localStorage.getItem("user"));

document.getElementById("result").innerHTML=`
<h2>🎉 Game Over</h2>
<h3>${user.name}</h3>
<h3>${user.village}</h3>
<h3>Score: ${score}</h3>

<button onclick="shareWhatsApp()">📲 Share</button>

${leaderboard(user.village)}

<button onclick="location.reload()">Play Again</button>
`;
}

// SAVE SCORE
function saveScore(){
let user=JSON.parse(localStorage.getItem("user"));
scores.push({name:user.name,village:user.village,score:score});
localStorage.setItem("scores",JSON.stringify(scores));
}

// LEADERBOARD
function leaderboard(village){

let data=scores.filter(d=>d.village==village);
data.sort((a,b)=>b.score-a.score);

let html="<h3>🏆 Leaderboard</h3>";

data.slice(0,5).forEach((d,i)=>{
html+=`<p>${i+1}. ${d.name} - ${d.score}</p>`;
});

return html;
}

// WHATSAPP
function shareWhatsApp(){
let user=JSON.parse(localStorage.getItem("user"));

let msg=`मैंने AIKUM SSC Quiz में ${score} score किया 💪🔥
आप भी खेलें 👉 https://sawariyaji2013-cloud.github.io/AIKUM-Test/`;

window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

</script>
