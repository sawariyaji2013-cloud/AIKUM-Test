<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AIKUM SSC Quiz</title>

<style>
body{font-family:sans-serif;background:#0b2a3a;color:#fff;text-align:center;}
.box{background:#123e5a;padding:20px;margin:15px;border-radius:10px;}
button{padding:12px;margin:5px;width:90%;background:orange;border:none;color:#fff;font-size:16px;border-radius:5px;}
input{padding:12px;margin:5px;width:90%;border-radius:5px;border:none;}
</style>
</head>

<body>

<div id="start" class="box">
<h2>🇮🇳 AIKUM SSC Quiz 🎯</h2>

<input id="playerName" type="text" placeholder="आपका नाम">
<input id="village" type="text" placeholder="गांव का नाम">
<input id="phone" type="tel" placeholder="मोबाइल नंबर">

<button onclick="startGame()">Start Game</button>
</div>

<div id="game" class="box" style="display:none;">
<h3 id="q"></h3>

<button onclick="use5050()" id="life">🎮 50-50 Lifeline</button>

<button onclick="ans(0)" id="o0"></button>
<button onclick="ans(1)" id="o1"></button>
<button onclick="ans(2)" id="o2"></button>
<button onclick="ans(3)" id="o3"></button>

<h3 id="timer"></h3>
<h3 id="score"></h3>
<h3 id="level"></h3>
</div>

<div id="result" class="box" style="display:none;"></div>
<div id="topper" class="box"></div>

<script>

// QUESTIONS
let questions = [
{q:"भारत का संविधान कब लागू हुआ?",o:["1947","1950","1949","1952"],a:1},
{q:"भारत की राजधानी क्या है?",o:["मुंबई","दिल्ली","कोलकाता","चेन्नई"],a:1},
{q:"UNO का मुख्यालय कहाँ है?",o:["लंदन","न्यूयॉर्क","पेरिस","जिनेवा"],a:1},
{q:"गुरुत्वाकर्षण की खोज किसने की?",o:["न्यूटन","आइंस्टीन","गैलीलियो","केप्लर"],a:0},
{q:"भारत का राष्ट्रीय पशु कौन है?",o:["हाथी","शेर","बाघ","घोड़ा"],a:2}
];

// 100 questions auto
while(questions.length < 100){
questions = questions.concat(questions);
}
questions = questions.slice(0,100);

// VARIABLES
let i=0,score=0,timer,t=10;
let player="",village="",phone="";
let used5050 = false;

// START GAME
function startGame(){

player=document.getElementById("playerName").value.trim();
village=document.getElementById("village").value.trim();
phone=document.getElementById("phone").value.trim();

if(player==="" || village==="" || phone===""){
alert("सभी जानकारी भरें");
return;
}

document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";

loadQ();
}

// LOAD QUESTION
function loadQ(){

used5050 = false;

let q = questions[i];

document.getElementById("q").innerText = q.q;

for(let x=0;x<4;x++){
let btn = document.getElementById("o"+x);
btn.innerText = q.o[x];
btn.style.display = "block";
}

document.getElementById("life").disabled = false;

document.getElementById("score").innerText="Score: "+score;
document.getElementById("level").innerText="Question: "+(i+1);

startTimer();
}

// TIMER
function startTimer(){
t=10;
clearInterval(timer);

timer=setInterval(()=>{
t--;
document.getElementById("timer").innerText="Time: "+t;

if(t<=0){
clearInterval(timer);
next();
}
},1000);
}

// ANSWER
function ans(x){
clearInterval(timer);

if(x===questions[i].a){
score++;
}

next();
}

// NEXT
function next(){
i++;
if(i>=questions.length){
end();
return;
}
loadQ();
}

// END
function end(){

saveTopper();
showTopper();

document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=`
<h2>Game Over 🎉</h2>
<h3>${player}</h3>
<h3>${village}</h3>
<h3>Score: ${score}/${questions.length}</h3>

<button onclick="sendWA()">📲 WhatsApp भेजें</button>
<button onclick="location.reload()">🔄 Play Again</button>
`;
}

// 50-50
function use5050(){

if(used5050){
alert("इस प्रश्न पर पहले ही use हो चुका है");
return;
}

used5050 = true;

let correct = questions[i].a;
let removed = 0;

for(let x=0;x<4;x++){
if(x !== correct && removed < 2){
document.getElementById("o"+x).style.display="none";
removed++;
}
}

document.getElementById("life").disabled = true;
}

// WHATSAPP
function sendWA(){

let msg=`SSC Quiz Result 🎯
Name: ${player}
Village: ${village}
Score: ${score}/${questions.length}`;

let url = "https://wa.me/918368922636?text=" + encodeURIComponent(msg);

window.open(url,"_blank");
}

// TOPPER SAVE
function saveTopper(){

let data = JSON.parse(localStorage.getItem("topper") || "[]");

data.push({
name: player,
village: village,
score: score
});

data.sort((a,b)=>b.score-a.score);
data = data.slice(0,3);

localStorage.setItem("topper", JSON.stringify(data));
}

// SHOW TOPPER
function showTopper(){

let data = JSON.parse(localStorage.getItem("topper") || "[]");

let html = "<h3>🏆 Topper List</h3>";

data.forEach((x,i)=>{
html += `<p>${i+1}. ${x.name} (${x.village}) - ${x.score}</p>`;
});

document.getElementById("topper").innerHTML = html;
}

</script>

</body>
</html>
