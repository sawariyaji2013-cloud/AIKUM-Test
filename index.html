<!DOCTYPE html>
<html>
<head>
<title>AIKUM SSC PRO Quiz</title>

<style>
body {font-family: Arial; background:#0c1b2a; color:white; text-align:center;}
.box {background:#1e3a5f; padding:20px; margin:20px auto; width:340px; border-radius:10px;}
button {margin:6px; padding:10px; width:90%; background:orange; border:none; color:white;}
input {padding:10px; margin:5px; width:90%;}
</style>

</head>

<body>

<h2>🏆 AIKUM SSC PRO QUIZ</h2>

<div class="box" id="start">
<input id="name" placeholder="Name"><br>
<input id="village" placeholder="Village"><br>
<button onclick="startGame()">Start Game</button>
</div>

<div class="box" id="game" style="display:none;">
<h3 id="q"></h3>

<button id="o0" onclick="answer(0)"></button>
<button id="o1" onclick="answer(1)"></button>
<button id="o2" onclick="answer(2)"></button>
<button id="o3" onclick="answer(3)"></button>

<button onclick="use5050()">50-50 Lifeline</button>

<h3 id="timer"></h3>
<h3 id="score"></h3>
</div>

<div class="box" id="result" style="display:none;"></div>

<script>

// DEFAULT QUESTIONS
let defaultQ=[
{q:"दिल्ली सल्तनत की स्थापना किसने की?", o:["कुतुबुद्दीन ऐबक","इल्तुतमिश","मुहम्मद गौरी","बलबन"], a:0},

{q:"इल्तुतमिश ने किसे अपना उत्तराधिकारी घोषित किया था?", o:["रुक्नुद्दीन फिरोज","रजिया सुल्तान","नसीरुद्दीन महमूद","बलबन"], a:1},

{q:"दिल्ली सल्तनत का पहला वास्तविक शासक किसे माना जाता है?", o:["कुतुबुद्दीन ऐबक","इल्तुतमिश","बलबन","अलाउद्दीन खिलजी"], a:1},

{q:"'चालीसा' (Turkan-e-Chihalgani) की स्थापना किसने की?", o:["इल्तुतमिश","बलबन","रजिया","फिरोज तुगलक"], a:0},

{q:"रजिया सुल्तान किस वंश से संबंधित थी?", o:["खिलजी","गुलाम","तुगलक","लोदी"], a:1},

{q:"बलबन ने कौन सी नीति अपनाई थी?", o:["सुलह-ए-कुल","लौह एवं रक्त नीति","दीन-ए-इलाही","इक्तादारी"], a:1},

{q:"'नौकरशाही का जनक' किसे कहा जाता है?", o:["इल्तुतमिश","बलबन","अलाउद्दीन खिलजी","फिरोज तुगलक"], a:2},

{q:"अलाउद्दीन खिलजी का बाजार नियंत्रण किस उद्देश्य से था?", o:["राजस्व बढ़ाने के लिए","सेना को सस्ता सामान देने के लिए","धर्म प्रचार के लिए","विदेश व्यापार के लिए"], a:1},

{q:"अलाउद्दीन खिलजी ने दक्षिण भारत में पहला आक्रमण किस पर किया?", o:["देवगिरी","वारंगल","मदुरै","कांची"], a:0},

{q:"मालिक काफूर किस शासक का सेनापति था?", o:["बलबन","अलाउद्दीन खिलजी","मुहम्मद बिन तुगलक","फिरोज तुगलक"], a:1},

{q:"मुहम्मद बिन तुगलक ने राजधानी कहाँ स्थानांतरित की थी?", o:["दिल्ली से आगरा","दिल्ली से दौलताबाद","दिल्ली से लाहौर","दिल्ली से जयपुर"], a:1},

{q:"टोकन मुद्रा किसने चलाई?", o:["अलाउद्दीन खिलजी","फिरोज तुगलक","मुहम्मद बिन तुगलक","बलबन"], a:2},

{q:"मुहम्मद बिन तुगलक की कौन सी योजना असफल रही?", o:["राजधानी परिवर्तन","टोकन मुद्रा","दोनों","कोई नहीं"], a:2},

{q:"फिरोज तुगलक ने कौन सा कर समाप्त किया?", o:["जजिया","खराज","गृह कर","कृषि कर"], a:2},

{q:"फिरोज तुगलक ने कितने नए शहर बसाए?", o:["2","4","10","50"], a:1},

{q:"लोदी वंश का संस्थापक कौन था?", o:["बहलोल लोदी","सिकंदर लोदी","इब्राहिम लोदी","खिज्र खां"], a:0},

{q:"दिल्ली सल्तनत का अंतिम शासक कौन था?", o:["इब्राहिम लोदी","सिकंदर लोदी","बहलोल लोदी","बाबर"], a:0},

{q:"पहली पानीपत की लड़ाई किसके बीच हुई?", o:["बाबर और इब्राहिम लोदी","बाबर और राणा सांगा","अकबर और हेमू","हुमायूं और शेरशाह"], a:0},

{q:"'इक्ता प्रणाली' किससे संबंधित है?", o:["राजस्व व्यवस्था","सैन्य व्यवस्था","न्याय व्यवस्था","धार्मिक व्यवस्था"], a:0},

{q:"नसीरुद्दीन महमूद किसका पुत्र था?", o:["इल्तुतमिश","बलबन","अलाउद्दीन","फिरोज"], a:0},

{q:"'दारुल इस्लाम' की अवधारणा किस काल में प्रमुख थी?", o:["गुलाम वंश","खिलजी वंश","तुगलक वंश","लोदी वंश"], a:0},

{q:"अलाउद्दीन खिलजी का राजस्व सुधार किस क्षेत्र में था?", o:["दोआब","राजस्थान","बंगाल","गुजरात"], a:0},

{q:"बलबन ने 'नियाबत-ए-खुदाई' की नीति क्यों अपनाई?", o:["धर्म प्रचार के लिए","राजसत्ता मजबूत करने के लिए","व्यापार बढ़ाने के लिए","विद्रोह रोकने के लिए"], a:1},

{q:"मुहम्मद बिन तुगलक का वास्तविक नाम क्या था?", o:["जुना खान","उलुग खान","नसीरुद्दीन","फिरोज"], a:0},

{q:"दिल्ली सल्तनत में 'दीवान-ए-अर्ज' का कार्य क्या था?", o:["वित्त","सेना","न्याय","धर्म"], a:1}

];


// LOAD DATA
let questions=JSON.parse(localStorage.getItem("questions"))||defaultQ;
let wrongQ=JSON.parse(localStorage.getItem("wrongQ"))||[];
let scores=JSON.parse(localStorage.getItem("scores"))||[];

// USER AUTO LOAD
if(localStorage.getItem("user")){
let u=JSON.parse(localStorage.getItem("user"));
document.getElementById("name").value=u.name;
document.getElementById("village").value=u.village;
}

let i=0,score=0,timer,t=10;
let used5050=false;

// START
function startGame(){

let name=document.getElementById("name").value;
let village=document.getElementById("village").value;

if(name==""||village==""){
alert("नाम और गांव डालें");
return;
}

// SAVE USER
localStorage.setItem("user",JSON.stringify({name,village}));

// REMOVE DUPLICATE
questions=removeDuplicate(questions);

// MERGE WRONG QUESTIONS FIRST
questions=[...wrongQ,...questions];

// SHUFFLE
questions=shuffle(questions);

// LIMIT
questions=questions.slice(0,100);

document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";

loadQ();
}

// REMOVE DUPLICATE
function removeDuplicate(arr){
let unique=[];
arr.forEach(q=>{
if(!unique.some(x=>x.q===q.q)){
unique.push(q);
}
});
localStorage.setItem("questions",JSON.stringify(unique));
return unique;
}

// SHUFFLE
function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

// LOAD
function loadQ(){

used5050=false;

let q=questions[i];

document.getElementById("q").innerText=q.q;

for(let x=0;x<4;x++){
let btn=document.getElementById("o"+x);
btn.style.display="block";
btn.innerText=q.o[x];
}

document.getElementById("score").innerText="Score: "+score;

startTimer();
}

// TIMER
function startTimer(){
t=10;
clearInterval(timer);

timer=setInterval(()=>{
t--;
document.getElementById("timer").innerText="Time: "+t;

if(t<=0){
clearInterval(timer);
saveWrong();
next();
}
},1000);
}

// ANSWER
function answer(x){

clearInterval(timer);

if(x===questions[i].a){
score++;
}else{
saveWrong();
}

next();
}

// SAVE WRONG
function saveWrong(){
wrongQ.push(questions[i]);
localStorage.setItem("wrongQ",JSON.stringify(wrongQ));
}

// NEXT
function next(){
i++;
if(i<questions.length){
loadQ();
}else{
endGame();
}
}

// 50-50
function use5050(){

if(used5050) return;
used5050=true;

let correct=questions[i].a;

let removed=0;

for(let x=0;x<4;x++){
if(x!==correct && removed<2){
document.getElementById("o"+x).style.display="none";
removed++;
}
}
}

// END
function endGame(){

saveScore();

document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";

let user=JSON.parse(localStorage.getItem("user"));

document.getElementById("result").innerHTML=`
<h2>🎉 Game Over</h2>
<h3>${user.name}</h3>
<h3>${user.village}</h3>
<h3>Score: ${score}</h3>

<button onclick="shareWhatsApp()">📲 Share</button>

${leaderboard(user.village)}

<button onclick="location.reload()">Play Again</button>
`;
}

// SAVE SCORE
function saveScore(){
let user=JSON.parse(localStorage.getItem("user"));
scores.push({name:user.name,village:user.village,score:score});
localStorage.setItem("scores",JSON.stringify(scores));
}

// LEADERBOARD
function leaderboard(village){

let data=scores.filter(d=>d.village==village);
data.sort((a,b)=>b.score-a.score);

let html="<h3>🏆 Leaderboard</h3>";

data.slice(0,5).forEach((d,i)=>{
html+=`<p>${i+1}. ${d.name} - ${d.score}</p>`;
});

return html;
}

// WHATSAPP
function shareWhatsApp(){
let user=JSON.parse(localStorage.getItem("user"));

let msg=`मैंने AIKUM SSC Quiz में ${score} score किया 💪🔥
आप भी खेलें 👉 https://sawariyaji2013-cloud.github.io/AIKUM-Test/`;

window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
