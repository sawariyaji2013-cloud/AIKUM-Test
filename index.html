<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AIKUM SSC Quiz</title>

<style>
body{font-family:sans-serif;background:#0b2a3a;color:#fff;text-align:center;}
.box{background:#123e5a;padding:20px;margin:15px;border-radius:10px;}
button{padding:12px;margin:5px;width:90%;background:orange;border:none;color:#fff;font-size:16px;border-radius:5px;}
input{padding:12px;margin:5px;width:90%;border-radius:5px;border:none;}
</style>
</head>

<body>

<div id="start" class="box">
<h2>🇮🇳 AIKUM SSC Quiz 🎯</h2>

<input id="playerName" type="text" placeholder="आपका नाम">
<input id="village" type="text" placeholder="गांव का नाम">
<input id="phone" type="tel" placeholder="मोबाइल नंबर">

<button type="button" onclick="startGame()">Start Game</button>
</div>

<div id="game" class="box" style="display:none;">
<h3 id="q"></h3>

<button onclick="ans(0)" id="o0"></button>
<button onclick="ans(1)" id="o1"></button>
<button onclick="ans(2)" id="o2"></button>
<button onclick="ans(3)" id="o3"></button>

<h3 id="timer"></h3>
<h3 id="score"></h3>
<h3 id="level"></h3>
</div>

<div id="result" class="box" style="display:none;"></div>

<script>

// QUESTIONS
  
let questions = [

{q:"राष्ट्रीय पक्षी?",o:["तोता","मोर","कौआ","हंस"],a:1},

{q:"संविधान लागू कब हुआ?",o:["1947","1950","1949","1952"],a:1},
{q:"गुरुत्वाकर्षण किसने खोजा?",o:["न्यूटन","आइंस्टीन","गैलीलियो","केप्लर"],a:0},
{q:"जल का सूत्र?",o:["H2O","CO2","O2","NaCl"],a:0},

{q:"7×8=?",o:["54","56","58","60"],a:1},

{q:"भारत का राष्ट्रीय खेल?",o:["क्रिकेट","हॉकी","फुटबॉल","कबड्डी"],a:1},
{q:"CPU का फुल फॉर्म?",o:["Central Processing Unit","Computer Unit","Central Unit","None"],a:0},
{q:"सबसे बड़ा ग्रह?",o:["पृथ्वी","मंगल","बृहस्पति","शुक्र"],a:2},
{q:"सबसे छोटा ग्रह?",o:["बुध","मंगल","शुक्र","पृथ्वी"],a:0},
{q:"भारत का सबसे बड़ा राज्य?",o:["राजस्थान","MP","UP","महाराष्ट्र"],a:0},
{q:"pH value पानी?",o:["7","5","9","10"],a:0},
{q:"ऑक्सीजन प्रतिशत?",o:["21%","50%","10%","30%"],a:0},
{q:"कंप्यूटर का जनक?",o:["चार्ल्स बैबेज","न्यूटन","ट्यूरिंग","एडिसन"],a:0},

{q:"9×9=?",o:["72","81","90","99"],a:1},
{q:"25+75=?",o:["90","95","100","110"],a:2},
{q:"भारत का राष्ट्रगान किसने लिखा?",o:["गांधी","नेहरू","टैगोर","पटेल"],a:2},
{q:"DNA का full form?",o:["Deoxyribo Nucleic Acid","Dynamic","None","Double"],a:0},
{q:"UNO मुख्यालय?",o:["लंदन","न्यूयॉर्क","पेरिस","जिनेवा"],a:1},
{q:"बल का SI मात्रक?",o:["जूल","न्यूटन","वाट","ओम"],a:1},
{q:"1 km = ?",o:["100 m","500 m","1000 m","1500 m"],a:2},
{q:"100÷10=?",o:["5","10","20","25"],a:1},
{q:"भारत का पहला राष्ट्रपति?",o:["राजेंद्र प्रसाद","नेहरू","गांधी","पटेल"],a:0},
{q:"भारत का पहला प्रधानमंत्री?",o:["गांधी","नेहरू","पटेल","राजेंद्र"],a:1},

{q:"12×12=?",o:["124","144","154","164"],a:1},
{q:"144÷12=?",o:["10","11","12","13"],a:2},
{q:"माउंट एवरेस्ट किस देश में है?",o:["भारत","नेपाल","चीन","भूटान"],a:1},
{q:"गंगा नदी का उद्गम?",o:["गंगोत्री","यमुनोत्री","केदारनाथ","बद्रीनाथ"],a:0},
{q:"सूर्य किस प्रकार का तारा है?",o:["लाल","पीला","नीला","सफेद"],a:1},
{q:"CO2 का नाम?",o:["कार्बन मोनो","कार्बन डाइऑक्साइड","ऑक्सीजन","नाइट्रोजन"],a:1},
{q:"भारत का संविधान किससे प्रेरित?",o:["UK","USA","France","All"],a:3},
{q:"लोकसभा सदस्य संख्या?",o:["545","500","550","530"],a:0},
{q:"राज्यसभा अधिकतम सदस्य?",o:["250","300","200","150"],a:0},
{q:"किस ग्रह पर जीवन संभव?",o:["मंगल","शुक्र","पृथ्वी","बुध"],a:2},

// 🔥 ऐसे ही 100 पूरे करने के लिए नीचे और जोड़ें

{q:"16×5=?",o:["60","70","80","90"],a:2},
{q:"81÷9=?",o:["8","9","7","6"],a:1},
{q:"भारत का राष्ट्रीय फूल?",o:["गुलाब","कमल","चंपा","मोगरा"],a:1},
{q:"चंद्रमा पर पहला मानव?",o:["नील आर्मस्ट्रांग","गागरिन","कलाम","टेस्ला"],a:0},
{q:"Light की speed?",o:["3×10^8","3×10^6","3×10^5","3×10^7"],a:0},

{q:"20×4=?",o:["60","70","80","90"],a:2},
{q:"50+50=?",o:["90","95","100","110"],a:2},
{q:"भारत का राष्ट्रीय ध्वज किसने बनाया?",o:["पिंगली वेंकैया","गांधी","नेहरू","पटेल"],a:0},
{q:"ISRO कहाँ है?",o:["दिल्ली","मुंबई","बेंगलुरु","चेन्नई"],a:2},
{q:"RAM का full form?",o:["Random Access Memory","Read Memory","Run Memory","None"],a:0},

{q:"25×4=?",o:["80","90","100","110"],a:2},
{q:"200÷4=?",o:["40","45","50","55"],a:2},
{q:"भारत की सबसे लंबी नदी?",o:["गंगा","यमुना","गोदावरी","नर्मदा"],a:0},
{q:"भारत का राष्ट्रीय गीत?",o:["वंदे मातरम","जन गण मन","सारे जहाँ","None"],a:0},
{q:"संसद के कितने सदन?",o:["1","2","3","4"],a:1},

{q:"30×3=?",o:["60","70","80","90"],a:3},
{q:"121÷11=?",o:["10","11","12","13"],a:1},
{q:"भारत का सर्वोच्च न्यायालय कहाँ है?",o:["दिल्ली","मुंबई","कोलकाता","चेन्नई"],a:0},
{q:"कौन सा ग्रह लाल ग्रह है?",o:["मंगल","शुक्र","बुध","शनि"],a:0},
{q:"शनि के कितने छल्ले हैं?",o:["5","6","7","8"],a:2},

{q:"14×7=?",o:["96","97","98","99"],a:2},
{q:"1000÷10=?",o:["10","50","100","150"],a:2},
{q:"भारत का राष्ट्रीय फल?",o:["आम","सेब","केला","अंगूर"],a:0},
{q:"भारत का राष्ट्रीय वृक्ष?",o:["नीम","बरगद","पीपल","आम"],a:1},
{q:"भारत का राष्ट्रीय पक्षी?",o:["तोता","मोर","कौआ","हंस"],a:1}

];

// VARIABLES
let i=0,score=0,timer,t=10;
let player="",village="",phone="";

// START GAME
function startGame(){
console.log("Total Questions:", questions.length);
player=document.getElementById("playerName").value.trim();
village=document.getElementById("village").value.trim();
phone=document.getElementById("phone").value.trim();

if(player==="" || village==="" || phone===""){
alert("सभी जानकारी भरें");
return;
}

document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";

loadQ();
}

// LOAD QUESTION
function loadQ(){
let q=questions[i];

document.getElementById("q").innerText=q.q;

for(let x=0;x<4;x++){
document.getElementById("o"+x).innerText=q.o[x];
}

document.getElementById("score").innerText="Score: "+score;
document.getElementById("level").innerText="Question: "+(i+1);

startTimer();
}

// TIMER
function startTimer(){
t=10;
clearInterval(timer);

timer=setInterval(()=>{
t--;
document.getElementById("timer").innerText="Time: "+t;

if(t<=0){
clearInterval(timer);
next();
}
},1000);
}

// ANSWER
function ans(x){
clearInterval(timer);

if(x===questions[i].a){
score++;
}

next();
}

// NEXT
function next(){
i++;
if(i>=questions.length){
end();
return;
}
loadQ();
}

// END
function end(){
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=`
<h2>Game Over 🎉</h2>
<h3>${player}</h3>
<h3>${village}</h3>
<h3>Score: ${score}/${questions.length}</h3>

<button onclick="location.reload()">🔄 Play Again</button>
`;
}

</script>

</body>
</html>
