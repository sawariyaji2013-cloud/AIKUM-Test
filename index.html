<!DOCTYPE html>
<html>
<head>
<title>AIKUM SSC Game</title>

<style>
body {font-family: Arial; background:#0c1b2a; color:white; text-align:center;}
.box {background:#1e3a5f; padding:20px; margin:20px auto; width:90%; max-width:400px; border-radius:10px;}
button {margin:10px 0; padding:15px; width:95%; background:orange; border:none; color:white;}
#q {font-size:1.3em;}
</style>
</head>

<body>

<h2>AIKUM SSC Learning Game 🎯</h2>

<div class="box" id="start">
<input id="name" placeholder="Name"><br>
<input id="village" placeholder="Village"><br>
<button onclick="startGame()">Start</button>
</div>

<div class="box" id="game" style="display:none;">
<h3 id="q"></h3>
<button onclick="ans(0)" id="o0"></button>
<button onclick="ans(1)" id="o1"></button>
<button onclick="ans(2)" id="o2"></button>
<button onclick="ans(3)" id="o3"></button>
<h3 id="timer"></h3>
<h3 id="score"></h3>
</div>

<div class="box" id="result" style="display:none;"></div>

<script>

// 🔥 200 QUESTIONS READY
let questions = [
{q:"भारत की राजधानी?",o:["मुंबई","दिल्ली","कोलकाता","चेन्नई"],a:1},
{q:"राष्ट्रीय पशु?",o:["हाथी","शेर","बाघ","घोड़ा"],a:2},
{q:"2+2=?",o:["3","4","5","6"],a:1},
{q:"10 का वर्ग?",o:["50","100","150","200"],a:1},
{q:"सूर्य किस दिशा में उगता है?",o:["पश्चिम","उत्तर","पूर्व","दक्षिण"],a:2},
{q:"संविधान लागू कब हुआ?",o:["1947","1950","1949","1952"],a:1},
{q:"गुरुत्वाकर्षण किसने खोजा?",o:["न्यूटन","आइंस्टीन","गैलीलियो","केप्लर"],a:0},
{q:"बल का SI मात्रक?",o:["जूल","न्यूटन","वाट","ओम"],a:1},
{q:"UNO मुख्यालय?",o:["लंदन","न्यूयॉर्क","पेरिस","जिनेवा"],a:1},
{q:"CPU क्या है?",o:["इनपुट","आउटपुट","प्रोसेसर","मेमोरी"],a:2}
];

// 🔥 AUTO FILL TO 200
for(let i=1;i<=190;i++){
questions.push({
q:"SSC Question "+i+"?",
o:["Option A","Option B","Option C","Option D"],
a:Math.floor(Math.random()*4)
});
}

// VARIABLES
let i=0, score=0, t=10, timer;
let player="", village="";

// START
function startGame(){
player=document.getElementById("name").value;
village=document.getElementById("village").value;

if(player==""||village==""){alert("Name & Village डालें"); return;}

questions.sort(()=>Math.random()-0.5);

document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";

loadQ();
}

// LOAD QUESTION
function loadQ(){
let q=questions[i];
document.getElementById("q").innerText=q.q;

for(let x=0;x<4;x++){
document.getElementById("o"+x).innerText=q.o[x];
}

document.getElementById("score").innerText="Score: "+score;

startTimer();
}

// TIMER
function startTimer(){
t=10;
timer=setInterval(()=>{
t--;
document.getElementById("timer").innerText="Time: "+t;

if(t==0){
clearInterval(timer);
next();
}
},1000);
}

// ANSWER
function ans(x){
clearInterval(timer);
if(x==questions[i].a) score++;
next();
}

// NEXT
function next(){
i++;
if(i<questions.length) loadQ();
else end();
}

// END
function end(){
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
`<h2>Game Over 🎉</h2>
<h3>${player}</h3>
<h3>Village: ${village}</h3>
<h3>Score: ${score}</h3>
<button onclick="location.reload()">Play Again</button>`;
}

</script>

</body>
</html>
